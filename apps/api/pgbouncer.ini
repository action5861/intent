;;;
;;; PgBouncer 설정 — Intendex API
;;;
;;; 설치:
;;;   Windows: https://www.pgbouncer.org/install.html (Chocolatey: choco install pgbouncer)
;;;   Ubuntu:  sudo apt-get install pgbouncer
;;;   Docker:  docker run -d -p 6432:5432 \
;;;              -e DATABASE_URL="postgresql://postgres:ljh04021@host.docker.internal:5432/intendex_dev" \
;;;              edoburu/pgbouncer
;;;
;;; 실행:
;;;   pgbouncer -d apps/api/pgbouncer.ini
;;;
;;; 적용 후 .env 변경:
;;;   DATABASE_URL="postgresql://postgres:ljh04021@localhost:6432/intendex_dev?schema=public&connection_limit=20&pool_timeout=10"
;;;   (포트 5432 → 6432, PgBouncer가 앞단에서 풀링)
;;;

[databases]
; 실제 PostgreSQL 연결 정보
intendex_dev = host=127.0.0.1 port=5432 dbname=intendex_dev

[pgbouncer]
;; 리슨 주소 (애플리케이션은 6432로 연결)
listen_addr = 127.0.0.1
listen_port = 6432

;; ── 풀링 모드 ────────────────────────────────────────────────────────
;; transaction: 트랜잭션 단위로 커넥션 공유 (권장 — 가장 효율적)
;; session:     세션 단위 (Prepared Statements 사용 시 필요)
;; statement:   쿼리 단위 (트랜잭션 사용 불가 — Intendex에는 부적합)
pool_mode = transaction

;; ── 커넥션 한계 ──────────────────────────────────────────────────────
;; 클라이언트(앱) → PgBouncer 최대 연결 수
max_client_conn = 1000

;; PgBouncer → PostgreSQL 실제 커넥션 수 (per database-user 쌍)
;; PM2 4 workers × connection_limit=20 = 80 + 여유분
default_pool_size = 25

;; 예비 커넥션 (트래픽 급증 시 즉시 사용)
reserve_pool_size = 5
reserve_pool_timeout = 3

;; ── 타임아웃 ─────────────────────────────────────────────────────────
;; 클라이언트가 풀 커넥션을 기다리는 최대 시간 (초)
pool_timeout = 10

;; 유휴 커넥션 유지 시간 (초)
server_idle_timeout = 600

;; 클라이언트 유휴 타임아웃
client_idle_timeout = 0

;; ── 인증 ─────────────────────────────────────────────────────────────
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
; userlist.txt 형식: "postgres" "md5해시_또는_평문"

;; ── 로깅 ─────────────────────────────────────────────────────────────
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid
log_connections = 1
log_disconnections = 1
log_stats = 1
stats_period = 60

;; ── 관리자 인터페이스 ────────────────────────────────────────────────
;; psql -h 127.0.0.1 -p 6432 -U pgbouncer pgbouncer
admin_users = pgbouncer
stats_users = pgbouncer

;; ── 운영 환경 권장 추가 설정 ─────────────────────────────────────────
;; server_round_robin = 1     # 다중 DB 서버 라운드로빈
;; ignore_startup_parameters = extra_float_digits  # ORM 호환성
